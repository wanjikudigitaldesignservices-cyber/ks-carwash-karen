<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>K's Carwash Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}:root{--primary:#2C2416;--accent:#D4410A;--yellow:#F5C842}body{font-family:'Open Sans',sans-serif;background:#f1f5f9}h1,h2,h3{font-family:'Bebas Neue',sans-serif}
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--primary)}.lb{background:white;padding:48px;border-radius:16px;max-width:400px;width:100%;text-align:center}.lb h2{color:var(--primary);margin-bottom:24px}.lb input{width:100%;padding:14px;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:12px;font-size:1rem}.lb button{width:100%;padding:14px;background:var(--accent);color:white;border:none;border-radius:8px;font-weight:700;cursor:pointer;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:0.05em}
.dash{display:none}.dh{background:var(--primary);color:white;padding:20px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}.dh h1{font-size:1.4rem}.dh button,.dh a{padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:0.9rem;color:white;background:rgba(255,255,255,0.1);text-decoration:none}.be{background:var(--accent)!important}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:24px 32px}.sc{background:white;padding:24px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}.sl{font-size:0.85rem;color:#6b7280;text-transform:uppercase}.sv{font-family:'Bebas Neue',sans-serif;font-size:2.5rem;margin-top:4px}
.tw{padding:0 32px 32px;overflow-x:auto}table{width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06)}th{background:var(--primary);color:white;padding:14px 16px;text-align:left;font-size:0.85rem;text-transform:uppercase}td{padding:12px 16px;border-bottom:1px solid #f1f5f9;font-size:0.9rem}
select.st{padding:6px 10px;border:1px solid #e2e8f0;border-radius:6px}.del{background:none;border:none;color:#ef4444;cursor:pointer;font-size:1.1rem}
@media(max-width:768px){.stats{grid-template-columns:1fr}}</style></head>
<body>
<div class="login" id="ls"><div class="lb"><h2>K's Carwash Admin</h2><input type="text" id="u" value="admin" placeholder="Username"><input type="password" id="p" placeholder="Password"><button onclick="login()">Sign In</button></div></div>
<div class="dash" id="dash">
<div class="dh"><h1>📊 K's Carwash Dashboard</h1><div><button class="be" onclick="exp()">📥 CSV</button> <a href="index.html">← Site</a> <button onclick="logout()">Logout</button></div></div>
<div class="stats"><div class="sc"><div class="sl">Total Bookings</div><div class="sv" id="st" style="color:#3b82f6">0</div></div><div class="sc"><div class="sl">New</div><div class="sv" id="sn" style="color:var(--accent)">0</div></div><div class="sc"><div class="sl">Completed</div><div class="sv" id="sd" style="color:#10b981">0</div></div></div>
<div class="tw"><table><thead><tr><th>Date</th><th>Name</th><th>Phone</th><th>Car</th><th>Service</th><th>Pref Date</th><th>Status</th><th></th></tr></thead><tbody id="tb"></tbody></table></div>
</div>
<script>
const K='ks_cw_bookings';if(sessionStorage.getItem('ks_cw_admin')==='true')showD();
function login(){if(document.getElementById('u').value==='admin'&&document.getElementById('p').value==='admin123'){sessionStorage.setItem('ks_cw_admin','true');showD()}else alert('Invalid')}
function logout(){sessionStorage.removeItem('ks_cw_admin');location.reload()}
function showD(){document.getElementById('ls').style.display='none';document.getElementById('dash').style.display='block';render()}
function gd(){return JSON.parse(localStorage.getItem(K)||'[]').sort((a,b)=>new Date(b.submittedAt)-new Date(a.submittedAt))}
function sv(d){localStorage.setItem(K,JSON.stringify(d))}
function render(){const d=gd();document.getElementById('st').textContent=d.length;document.getElementById('sn').textContent=d.filter(x=>x.status==='New').length;document.getElementById('sd').textContent=d.filter(x=>x.status==='Completed').length;
document.getElementById('tb').innerHTML=d.map(i=>`<tr><td>${new Date(i.submittedAt).toLocaleDateString('en-GB')}</td><td><b>${i.name||'—'}</b></td><td>${i.phone||'—'}</td><td>${i.car||'—'}</td><td>${i.service||'—'}</td><td>${i.date||'—'}</td><td><select class="st" onchange="upd(${i.id},this.value)">${['New','Contacted','Completed'].map(s=>`<option ${i.status===s?'selected':''}>${s}</option>`).join('')}</select></td><td><button class="del" onclick="del(${i.id})">🗑</button></td></tr>`).join('')}
function upd(id,s){const d=gd();const i=d.find(x=>x.id===id);if(i){i.status=s;sv(d);render()}}
function del(id){if(!confirm('Delete?'))return;sv(gd().filter(x=>x.id!==id));render()}
function exp(){const d=gd();if(!d.length)return alert('No data');const h=['Date','Name','Phone','Car','Service','Date','Status'];const r=d.map(i=>[new Date(i.submittedAt).toLocaleDateString(),i.name,i.phone,i.car,i.service,i.date,i.status]);const c=[h,...r].map(r=>r.map(c=>`"${(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');const b=new Blob([c],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='ks_carwash_bookings.csv';a.click()}
document.getElementById('p').addEventListener('keydown',e=>{if(e.key==='Enter')login()});
</script></body></html>
